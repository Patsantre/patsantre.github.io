<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Alexey — юрист по ИИ и AI-агентам</title>
<meta name="description" content="Юрист по искусственному интеллекту и автономным AI-агентам. Сайт скоро откроется." />
<meta name="yandex-verification" content="404ca768564faf2e" />
<style>
  :root{--bg:#0a0c12;--text:#eaf0ff;--muted:#8b94ad;--cyan:#46e0d0;--violet:#9a7bff;--line:#1e2433}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,"Segoe UI",Roboto,Inter,sans-serif;background:var(--bg);color:var(--text);
    display:grid;place-items:center;text-align:center;padding:32px;line-height:1.6;
    background-image:
      radial-gradient(760px 420px at 80% -10%,rgba(154,123,255,.20),transparent 60%),
      radial-gradient(640px 360px at -5% 110%,rgba(70,224,208,.16),transparent 60%);
  }
  .wrap{max-width:600px}
  .status{display:inline-flex;align-items:center;gap:9px;font-size:13px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:8px 16px;margin-bottom:30px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--cyan);box-shadow:0 0 0 0 rgba(70,224,208,.6);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(70,224,208,.55)}70%{box-shadow:0 0 0 10px rgba(70,224,208,0)}100%{box-shadow:0 0 0 0 rgba(70,224,208,0)}}
  h1{font-size:clamp(34px,7vw,56px);letter-spacing:-.03em;font-weight:800;line-height:1.05}
  .role{margin-top:14px;font-size:clamp(17px,3.4vw,21px);
    background:linear-gradient(100deg,var(--cyan),var(--violet));-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:700}
  .soon{margin-top:22px;color:var(--muted);font-size:17px}
  .contacts{margin-top:30px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .btn{display:inline-block;text-decoration:none;color:var(--text);font-weight:600;
    border:1px solid var(--line);border-radius:999px;padding:12px 24px;transition:border-color .15s,color .15s}
  .btn:hover{border-color:var(--cyan);color:var(--cyan)}
  footer{position:fixed;bottom:22px;left:0;right:0;color:var(--muted);font-size:13px}
</style>
</head>
<body>
  <main class="wrap">
    <span class="status"><span class="dot"></span>Сайт в разработке</span>
    <h1>Alexey</h1>
    <div class="role">AI-native юрист, энтузиаст AI-агентов</div>
    <p class="soon">Полноценный сайт скоро откроется. Пока — по вопросам пишите на почту.</p>
    <div class="contacts">
      <a class="btn" href="mailto:alexey@rybolovlev.dev">alexey@rybolovlev.dev</a>
      <!-- TELEGRAM: добавлю кнопку, как только пришлёшь @username -->
    </div>
  </main>
  <footer>© <span id="y"></span> rybolovlev.dev</footer>
  <script>document.getElementById('y').textContent=new Date().getFullYear()</script>
</body>
</html>
