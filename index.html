<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Alexey — AI-native юрист</title>
<meta name="description" content="Alexey — AI-native юрист." />
<meta name="yandex-verification" content="404ca768564faf2e" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous" />
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
<style>
  :root{--bg:#0a0c12;--text:#eaf0ff;--muted:#8b94ad;--cyan:#46e0d0;--violet:#9a7bff;--line:#1e2433}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,"Segoe UI",Roboto,Inter,sans-serif;background:var(--bg);color:var(--text);
    display:grid;place-items:center;text-align:center;padding:32px;line-height:1.6;
    background-image:
      radial-gradient(760px 420px at 80% -10%,rgba(154,123,255,.20),transparent 60%),
      radial-gradient(640px 360px at -5% 110%,rgba(70,224,208,.16),transparent 60%);
  }
  .wrap{max-width:640px}
  h1{font-size:clamp(40px,8vw,64px);letter-spacing:-.03em;font-weight:800;line-height:1.05}
  .role{margin-top:14px;font-size:clamp(17px,3.4vw,21px);font-weight:700;
    background:linear-gradient(100deg,var(--cyan),var(--violet));-webkit-background-clip:text;background-clip:text;color:transparent}
  .motto{margin:30px auto 4px;color:#c7d0e6}
  .motto .katex{font-size:1.7rem}
  .contacts{margin-top:34px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .btn{display:inline-block;text-decoration:none;color:var(--text);font-weight:600;
    border:1px solid var(--line);border-radius:999px;padding:12px 24px;transition:border-color .15s,color .15s}
  .btn:hover{border-color:var(--cyan);color:var(--cyan)}
  footer{position:fixed;bottom:22px;left:0;right:0;color:var(--muted);font-size:13px}
</style>
</head>
<body>
  <main class="wrap">
    <h1>Alexey</h1>
    <div class="role">AI-native юрист</div>
    <div class="motto" id="motto" aria-label="Девиз: в пределе попытки дают успех">\lim_{n \to \infty} \mathrm{try}_n = \mathrm{success}</div>
    <div class="contacts">
      <a class="btn" href="mailto:alexey@rybolovlev.dev">alexey@rybolovlev.dev</a>
      <a class="btn" href="https://t.me/alexey_rybolovlev">Telegram</a>
    </div>
  </main>
  <footer>© <span id="y"></span> rybolovlev.dev</footer>
  <script>
    document.getElementById('y').textContent=new Date().getFullYear();
    window.addEventListener('load',function(){
      try{
        var el=document.getElementById('motto');
        katex.render(el.textContent.trim(), el, {throwOnError:false, displayMode:true});
      }catch(e){}
    });
  </script>
</body>
</html>
